[gcode_macro PRINT_START]
gcode:
    {% set BED_TEMPERATURE = params.BED|default(60)|float %}
    {% set EXTRUDER_TEMPERATURE = params.EXTRUDER|default(190)|float %}
    # Wait for bed to reach temperature
    M104 S180
    M190 S{BED_TEMPERATURE}
    G28
    BED_MESH_PROFILE LOAD=default
    # If you are using Z-Tilt:
    #Z_TILT_ADJUST
    G92 E0
    G1 Z2.0
    G1 X0.1 Y20 Z0.3
    M109 S{EXTRUDER_TEMPERATURE}
    G1 X0.1 Y200.0 Z0.3 F1500.0 E15
    G1 X0.4 Y200.0 Z0.3 F5000.0
    G1 X0.4 Y20 Z0.3 F1500.0 E30
    G92 E0
    G1 Z2.0 F3000
    G1 X5 Y20 Z0.3 F5000.0
    
[gcode_macro PRINT_END]
gcode:
    # Turn off bed, extruder, and fan
    M140 S0
    M104 S0
    M106 S0
    # Move nozzle away from print while retracting
    G91
    G1 X-2 Y-2 E-3 F300
    # Raise nozzle by 10mm
    G1 Z10 F3000
    G90
    # Disable steppers
    M84
    #SET_SKEW CLEAR=1

[gcode_macro LED_ANIM]
gcode:
  # Reset
  SET_LED LED=LED RED=0 GREEN=0 BLUE=0 INDEX=1
  SET_LED LED=LED RED=0 GREEN=0 BLUE=0 INDEX=2
  G4 P150

  # 🌈 Rainbow rápido
  SET_LED LED=LED RED=1 GREEN=0 BLUE=0 INDEX=1
  SET_LED LED=LED RED=0 GREEN=1 BLUE=0 INDEX=2
  G4 P120

  SET_LED LED=LED RED=0 GREEN=0 BLUE=1 INDEX=1
  SET_LED LED=LED RED=1 GREEN=1 BLUE=0 INDEX=2
  G4 P120

  SET_LED LED=LED RED=1 GREEN=0 BLUE=1 INDEX=1   # roxo
  SET_LED LED=LED RED=0 GREEN=1 BLUE=1 INDEX=2   # ciano
  G4 P120

  # 💜 Pulso roxo
  SET_LED LED=LED RED=0.5 GREEN=0 BLUE=0.5 INDEX=1
  SET_LED LED=LED RED=0.5 GREEN=0 BLUE=0.5 INDEX=2
  G4 P150

  SET_LED LED=LED RED=1 GREEN=0 BLUE=1 INDEX=1
  SET_LED LED=LED RED=1 GREEN=0 BLUE=1 INDEX=2
  G4 P150

  SET_LED LED=LED RED=0.3 GREEN=0 BLUE=0.3 INDEX=1
  SET_LED LED=LED RED=0.3 GREEN=0 BLUE=0.3 INDEX=2
  G4 P150

  # 🔁 Alternância rápida
  SET_LED LED=LED RED=1 GREEN=0.5 BLUE=0 INDEX=1
  SET_LED LED=LED RED=0 GREEN=0.5 BLUE=1 INDEX=2
  G4 P100

  SET_LED LED=LED RED=0 GREEN=0.5 BLUE=1 INDEX=1
  SET_LED LED=LED RED=1 GREEN=0.5 BLUE=0 INDEX=2
  G4 P100

  SET_LED LED=LED RED=1 GREEN=0 BLUE=1 INDEX=1
  SET_LED LED=LED RED=0 GREEN=1 BLUE=0 INDEX=2
  G4 P100

  # 🔔 "Ringtone style" (ritmo tipo Nokia)
  # curto-curto-longo
  SET_LED LED=LED RED=1 GREEN=1 BLUE=1 INDEX=1
  SET_LED LED=LED RED=1 GREEN=1 BLUE=1 INDEX=2
  G4 P120

  SET_LED LED=LED RED=0 GREEN=0 BLUE=0 INDEX=1
  SET_LED LED=LED RED=0 GREEN=0 BLUE=0 INDEX=2
  G4 P120

  SET_LED LED=LED RED=1 GREEN=1 BLUE=1 INDEX=1
  SET_LED LED=LED RED=1 GREEN=1 BLUE=1 INDEX=2
  G4 P120

  SET_LED LED=LED RED=0 GREEN=0 BLUE=0 INDEX=1
  SET_LED LED=LED RED=0 GREEN=0 BLUE=0 INDEX=2
  G4 P120

  SET_LED LED=LED RED=1 GREEN=1 BLUE=1 INDEX=1
  SET_LED LED=LED RED=1 GREEN=1 BLUE=1 INDEX=2
  G4 P300

  # 🔵 Final azul sólido
  SET_LED LED=LED RED=0 GREEN=0 BLUE=1 INDEX=1
  SET_LED LED=LED RED=0 GREEN=0 BLUE=1 INDEX=2

[gcode_macro M300]
gcode:  
    {% set S = params.S | default(1000) | int %} ; S sets the tone frequency
    {% set P = params.P | default(100) | int %} ; P sets the tone duration
    {% set L = 0.5 %} ; L varies the PWM on time, close to 0 or 1 the tone gets a bit quieter. 0.5 is a symmetric waveform
    {% if S <= 0 %} ; dont divide through zero
    {% set F = 1 %}
    {% set L = 0 %}
    {% elif S >= 10000 %} ;max frequency set to 10kHz
    {% set F = 0 %}
    {% else %}
    {% set F = 1/S %} ;convert frequency to seconds 
    {% endif %}
    SET_PIN PIN=BEEPER_Pin VALUE={L} CYCLE_TIME={F} ;Play tone
    G4 P{P} ;tone duration
    SET_PIN PIN=BEEPER_Pin VALUE=0

[gcode_macro BUZZER_TEST]
gcode:
    M300 S1000 P100
    M300 S1000 P100
    M300 S1000 P100

[gcode_macro M486]
gcode:
  # Parameters known to M486 are as follows:
  #   [C<flag>] Cancel the current object
  #   [P<index>] Cancel the object with the given index
  #   [S<index>] Set the index of the current object.
  #       If the object with the given index has been canceled, this will cause
  #       the firmware to skip to the next object. The value -1 is used to
  #       indicate something that isn’t an object and shouldn’t be skipped.
  #   [T<count>] Reset the state and set the number of objects
  #   [U<index>] Un-cancel the object with the given index. This command will be
  #       ignored if the object has already been skipped

  {% if 'exclude_object' not in printer %}
    {action_raise_error("[exclude_object] is not enabled")}
  {% endif %}

  {% if 'T' in params %}
    EXCLUDE_OBJECT RESET=1

    {% for i in range(params.T | int) %}
      EXCLUDE_OBJECT_DEFINE NAME={i}
    {% endfor %}
  {% endif %}

  {% if 'C' in params %}
    EXCLUDE_OBJECT CURRENT=1
  {% endif %}

  {% if 'P' in params %}
    EXCLUDE_OBJECT NAME={params.P}
  {% endif %}

  {% if 'S' in params %}
    {% if params.S == '-1' %}
      {% if printer.exclude_object.current_object %}
        EXCLUDE_OBJECT_END NAME={printer.exclude_object.current_object}
      {% endif %}
    {% else %}
      EXCLUDE_OBJECT_START NAME={params.S}
    {% endif %}
  {% endif %}

  {% if 'U' in params %}
    EXCLUDE_OBJECT RESET=1 NAME={params.U}
  {% endif %}

