[include moongate.cfg]

########################################
# INCLUDES
########################################
[include mainsail.cfg]
[include macros.cfg]

########################################
# MCU
########################################
[mcu]
serial: /dev/serial/by-id/usb-Klipper_lpc1769_1DD00011C908D895BEF96362C32000F5-if00

[mcu host]
serial: /tmp/klipper_host_mcu

[mcu adxl]
serial: /dev/serial/by-id/usb-Klipper_rp2040_E6647C74035F6737-if00

[adxl345]
cs_pin: adxl:gpio9
spi_software_sclk_pin: adxl:gpio10
spi_software_mosi_pin: adxl:gpio11
spi_software_miso_pin: adxl:gpio12

[resonance_tester]
accel_chip: adxl345
probe_points:
    117.5, 117.5, 20

########################################
# PRINTER
########################################
[printer]
kinematics: cartesian
max_velocity: 250
max_accel: 4500
max_z_velocity: 25
max_z_accel: 100

[force_move]
enable_force_move: True

[skew_correction]

########################################
# MOVIMENTO / HOMING
########################################
[safe_z_home]
home_xy_position: 117.5, 117.5
z_hop: 5
z_hop_speed: 15

########################################
# STEPPERS
########################################
[stepper_x]
step_pin: P2.2
dir_pin: !P2.6
enable_pin: !P2.1
microsteps: 64
rotation_distance: 40
endstop_pin: ^!P1.29
position_endstop: -7
position_min: -7
position_max: 235
homing_speed: 50

[stepper_y]
step_pin: P0.19
dir_pin: P0.20
enable_pin: !P2.8
microsteps: 64
rotation_distance: 40
endstop_pin: ^!P1.28
position_endstop: 0
position_min: 0
position_max: 235
homing_speed: 50

[stepper_z]
step_pin: P0.22
dir_pin: P2.11
enable_pin: !P0.21
microsteps: 64
rotation_distance: 8
endstop_pin: ^!P1.27
#position_endstop: 0
position_min: -2
position_max: 270

########################################
# EXTRUSOR
########################################
[extruder]
step_pin: P2.13
dir_pin: !P0.11
enable_pin: !P2.12
microsteps: 64
rotation_distance: 22.88

nozzle_diameter: 0.400
filament_diameter: 1.750

heater_pin: P2.7
sensor_type: EPCOS 100K B57560G104F
sensor_pin: P0.23
#control: pid
#pid_Kp: 22.20
#pid_Ki: 1.08
#pid_Kd: 114.00

min_temp: 0
max_temp: 275

########################################
# DRIVERS TMC2209 (UART)
########################################
[tmc2208 stepper_x]
uart_pin: P1.10
interpolate: True
run_current: 0.8
sense_resistor: 0.110

[tmc2208 stepper_y]
uart_pin: P1.9
interpolate: True
run_current: 0.8
sense_resistor: 0.110

[tmc2208 stepper_z]
uart_pin: P1.8
interpolate: True
run_current: 0.8
sense_resistor: 0.110

[tmc2209 extruder]
uart_pin: P1.4
interpolate: True
run_current: 0.8
sense_resistor: 0.110

########################################
# MESA AQUECIDA
########################################
[heater_bed]
heater_pin: P2.5
sensor_type: Generic 3950
sensor_pin: P0.25

min_temp: 0
max_temp: 150

control: pid
pid_kp: 71.634
pid_ki: 1.368
pid_kd: 937.509

########################################
# FANS
########################################
[fan]
pin: P2.3

########################################
# BLTOUCH
########################################
[bltouch]
sensor_pin: ^P0.10
control_pin: P2.0
set_output_mode: 5V
x_offset: -1.5
y_offset: -34
#z_offset: 0
#probe_with_touch_mode: True
samples: 2
samples_result: median

########################################
# BED MESH
########################################
[bed_mesh]
mesh_min: 31.5, 34
mesh_max: 199.5, 201
probe_count: 10, 10
algorithm: bicubic
zero_reference_position: 117.5, 117.5

########################################
# NIVELAMENTO MECÂNICO
########################################
[screws_tilt_adjust]
screw1: 31.5, 68
screw1_name: Frente Esquerda
screw2: 199.5, 68
screw2_name: Frente Direita
screw3: 31.5, 235
screw3_name: Traseira Esquerda
screw4: 199.5, 235
screw4_name: Traseira Direita
screw_thread: CW-M3

########################################
# SENSOR DE FILAMENTO
########################################
[filament_switch_sensor MKS_FES]
switch_pin: P1.26

########################################
# LED & BEEPER
########################################
[neopixel LED]
pin: P1.24
chain_count: 2
initial_BLUE: 1.0

[output_pin BEEPER_Pin]
pin: P1.30
pwm: True

[delayed_gcode start_led_anim]
initial_duration: 1
gcode:
  LED_ANIM

########################################
# FEATURES
########################################
[pause_resume]
[exclude_object]

[gcode_arcs]
resolution: 0.1

[idle_timeout]
timeout: 21600

[gcode_button emergencia]
pin: ^!P1.31
press_gcode: M112

