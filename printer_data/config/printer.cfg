########################################
# INCLUDES
########################################
[include mainsail.cfg]
[include macros.cfg]


########################################
# MCU
########################################
[mcu]
serial: /dev/serial/by-id/usb-Klipper_stm32f429xx_1C0030001550305031353020-if00

[mcu host]
serial: /tmp/klipper_host_mcu

# [mcu adxl]
# serial: /dev/serial/by-id/usb-Klipper_rp2040_E6647C74035F6737-if00


########################################
# PRINTER
########################################
[printer]
kinematics: cartesian
max_velocity: 250
max_accel: 4500
max_z_velocity: 25
max_z_accel: 100

[force_move]
enable_force_move: True

[skew_correction]


########################################
# MOVIMENTO / HOMING
########################################
[safe_z_home]
home_xy_position: 117.5, 117.5
z_hop: 5
z_hop_speed: 15


########################################
# MOTORES
########################################
[output_pin motor_power]
pin: PC13
value: 1

[stepper_x]
step_pin: PE2
dir_pin: !PE1
enable_pin: !PE3
microsteps: 64
rotation_distance: 40
endstop_pin: ^!PC1
position_endstop: -7
position_min: -7
position_max: 235
homing_speed: 50

[stepper_y]
step_pin: PD5
dir_pin: PD4
enable_pin: !PD6
microsteps: 64
rotation_distance: 40
endstop_pin: ^!PC3
position_endstop: 0
position_min: 0
position_max: 235
homing_speed: 50

[stepper_z]
step_pin: PA15
dir_pin: PA8
enable_pin: !PD1
microsteps: 64
rotation_distance: 8
endstop_pin: ^!PC0
position_endstop: 0
position_min: -2
position_max: 270

# [stepper_z1]
# ...


########################################
# EXTRUSOR
########################################
[extruder]
step_pin: PD15
dir_pin: !PD14
enable_pin: !PC7
microsteps: 64
rotation_distance: 33.333

nozzle_diameter: 0.400
filament_diameter: 1.750

heater_pin: PB3
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PA2

control: pid
pid_Kp: 22.20
pid_Ki: 1.08
pid_Kd: 114.00

min_temp: 0
max_temp: 275


########################################
# DRIVERS (TMC)
########################################
[tmc2208 stepper_x]
uart_pin: PE0
run_current: 0.540
sense_resistor: 0.110
interpolate: False
stealthchop_threshold: 0

[tmc2208 stepper_y]
uart_pin: PD3
run_current: 0.540
sense_resistor: 0.110
interpolate: False
stealthchop_threshold: 0

[tmc2208 stepper_z]
uart_pin: PD0
run_current: 0.540
interpolate: False
stealthchop_threshold: 0

[tmc2209 extruder]
uart_pin: PC6
run_current: 0.540
sense_resistor: 0.110
interpolate: False
stealthchop_threshold: 0


########################################
# AQUECIMENTO DA MESA
########################################
[heater_bed]
heater_pin: PD7
sensor_type: Generic 3950
sensor_pin: PA1
min_temp: 0
max_temp: 150
control = pid
pid_kp = 71.634
pid_ki = 1.368
pid_kd = 937.509


########################################
# FANS
########################################
[controller_fan fan_motores]
pin: PB5
stepper: stepper_x, stepper_y, stepper_z, extruder

[temperature_fan fan_interna]
pin: PB6
sensor_type: temperature_mcu
control: watermark
min_temp: 20
max_temp: 100
target_temp: 42

[fan]
pin: PB7


########################################
# PROBE / NIVELAMENTO
########################################
[bltouch]
sensor_pin: PE4
control_pin: PE5
set_output_mode: 5V

x_offset: -1.5
y_offset: -34
z_offset: 0

samples: 2
samples_tolerance: 0.2


[bed_mesh]
mesh_min: 31.5, 34
mesh_max: 199.5, 201
probe_count: 15, 15
algorithm: bicubic
zero_reference_position: 117.5, 117.5

[delayed_gcode bed_mesh_init]
initial_duration: 0.01
gcode:
  BED_MESH_PROFILE LOAD=default


########################################
# AJUSTE MECÂNICO
########################################
[screws_tilt_adjust]
screw1: 31.5, 68
screw1_name: Frente Esquerda
screw2: 199.5, 68
screw2_name: Frente Direita
screw3: 31.5, 235
screw3_name: Traseira Esquerda
screw4: 199.5, 235
screw4_name: Traseira Direita
screw_thread: CW-M3


########################################
# SENSORES
########################################
[filament_switch_sensor MKS_FES]
switch_pin: PA0

#[gcode_button emergencia]
#pin: ^!host:gpio26
#press_gcode: M112


########################################
# LED / SINALIZAÇÃO
########################################
[neopixel LED]
pin: PE6
chain_count: 2
initial_BLUE: 1.0

[delayed_gcode startup_led_anim]
initial_duration: 1
gcode:
  LED_ANIM

[output_pin BEEPER_Pin]
pin: host:gpio26
pwm: True


########################################
# FEATURES
########################################
[pause_resume]

[exclude_object]

[gcode_arcs]
resolution: 0.1


